services:
  backend:
    image: ghcr.io/anddev741/beyou-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-beyou}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1516}
    ports:
      - "8099:8099"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - beyou_net

  frontend:
    image: ghcr.io/anddev741/beyou-web:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - beyou_net

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 300
    networks:
      - beyou_net
