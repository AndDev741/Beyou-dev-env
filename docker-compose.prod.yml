version: "3.8"

services:
  backend:
    build:
      context: ../Beyou-backend-spring
      dockerfile: Dockerfile
      target: runtime
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-beyou}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1516}
    ports:
      - "8099:8099"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - beyou_net

  frontend:
    build:
      context: ../Beyou-Frontend
      dockerfile: Dockerfile
      target: nginx
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - beyou_net
